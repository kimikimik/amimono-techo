<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#f6f3ec" />
  <title>編みもの帖</title>

  <!--
    編みもの帖 — しおりコア 実機版 v1（IndexedDB / 単一HTML）
    出発点：amimono-techo-shiori.jsx（写真・二層版・v19）
    変更点はこの2つだけ：
      ① ビルド不要の単一HTMLに畳んだ（React/Tailwind/Babel をCDNで読む）
      ② 保存を window.storage → IndexedDB に差し替え（写真が溜まっても破綻しない容量へ）
    UIコード（見た目・文言・誘い水・温度）は元のまま、一字一句変えていない。
  -->

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    // ───────────────────────────────────────────────
    // 保存層：window.storage と同じ「get / set」の形をした IndexedDB の部品。
    // これで本体コード（works の読み書き）は一切変えずに引っ越せる。
    //   ・get(key) → { value } もしくは null
    //   ・set(key, value)
    // ───────────────────────────────────────────────
    const idbStorage = {
      _db: null,
      _open() {
        if (this._db) return this._db;
        this._db = new Promise((resolve, reject) => {
          const req = indexedDB.open("amimono-techo", 1);
          req.onupgradeneeded = () => req.result.createObjectStore("kv");
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
        return this._db;
      },
      async get(key) {
        const db = await this._open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction("kv", "readonly");
          const req = tx.objectStore("kv").get(key);
          req.onsuccess = () => resolve(req.result != null ? { value: req.result } : null);
          req.onerror = () => reject(req.error);
        });
      },
      async set(key, value) {
        const db = await this._open();
        return new Promise((resolve, reject) => {
          const tx = db.transaction("kv", "readwrite");
          tx.objectStore("kv").put(value, key);
          tx.oncomplete = () => resolve({ key, value });
          tx.onerror = () => reject(tx.error);
        });
      },
    };

    // 本体コードはこの名前のまま window.storage を呼ぶ。中身だけ IndexedDB に。
    window.storage = idbStorage;

    // ───────────────────────────────────────────────
    // ここから下は amimono-techo-shiori.jsx（写真・二層版）そのまま。
    //   import 文を削り、export default を外し、末尾に render を足しただけ。
    // ───────────────────────────────────────────────

    // 編みもの帖 — しおり版 + 「満ちる（写真）」を試す版
    //   ・写真は「あしあと」の一種（文字のメモと同じ列に並ぶ）
    //   ・最初の一枚が自動で“顔（表紙）”に。あとからタップで変えられる
    //   ・「写真をそえる」は静かな誘い水（押さない・いつでもそこにある）

    const KEY = "amimono:techo:shiori:v1";

    const serif = { fontFamily: "'Georgia', 'Noto Serif JP', serif" };
    const paper = "#f6f3ec";
    const ink = "#4a443b";

    function fmt(ts) {
      const d = new Date(ts);
      return `${d.getMonth() + 1}月${d.getDate()}日 ${String(d.getHours()).padStart(2, "0")}:${String(
        d.getMinutes()
      ).padStart(2, "0")}`;
    }
    function fmtDay(ts) {
      const d = new Date(ts);
      return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    // その子の“顔”＝表紙の写真を取り出す（明示selectがあればそれ、なければ最初の一枚）
    function coverSrc(w) {
      const photos = (w.timeline || []).filter((e) => e.type === "photo");
      if (photos.length === 0) return null;
      if (w.coverId) {
        const c = photos.find((p) => p.id === w.coverId);
        if (c) return c.src;
      }
      return photos[0].src;
    }

    function App() {
      const [works, setWorks] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [saved, setSaved] = useState(false);
      const [openId, setOpenId] = useState(null);

      useEffect(() => {
        (async () => {
          try {
            const r = await window.storage.get(KEY);
            if (r && r.value) setWorks(JSON.parse(r.value));
          } catch (e) {}
          setLoaded(true);
        })();
      }, []);

      useEffect(() => {
        if (!loaded) return;
        (async () => {
          try {
            await window.storage.set(KEY, JSON.stringify(works));
            setSaved(true);
            const t = setTimeout(() => setSaved(false), 1400);
            return () => clearTimeout(t);
          } catch (e) {}
        })();
      }, [works, loaded]);

      const open = works.find((w) => w.id === openId) || null;

      function startCounting() {
        const id = "w" + Date.now();
        const w = {
          id,
          createdAt: Date.now(),
          currentRow: 0,
          name: "",
          timeline: [],
          completed: false,
          unravelOpenId: null,
          coverId: null,
        };
        setWorks((prev) => [w, ...prev]);
        setOpenId(id);
      }

      function updateWork(id, fn) {
        setWorks((prev) => prev.map((w) => (w.id === id ? fn({ ...w }) : w)));
      }

      if (!loaded) {
        return (
          <div style={{ ...serif, background: paper }} className="min-h-screen flex items-center justify-center">
            <p className="text-stone-400 text-sm">ひらいています…</p>
          </div>
        );
      }

      return (
        <div style={{ ...serif, background: paper, color: ink }} className="min-h-screen">
          {open ? (
            <WorkView work={open} onBack={() => setOpenId(null)} updateWork={updateWork} />
          ) : (
            <Home works={works} onStart={startCounting} onOpen={setOpenId} />
          )}
          <div
            className={`fixed bottom-3 left-1/2 -translate-x-1/2 text-xs text-stone-400 transition-opacity duration-500 ${
              saved ? "opacity-100" : "opacity-0"
            }`}
          >
            保存しました
          </div>
        </div>
      );
    }

    function Home({ works, onStart, onOpen }) {
      const wip = works.filter((w) => !w.completed);
      const done = works.filter((w) => w.completed);

      return (
        <div className="max-w-md mx-auto px-6 pt-12 pb-24">
          <p className="text-xs tracking-widest text-stone-400 mb-1">AMIMONO</p>
          <h1 className="text-xl text-stone-700 mb-10">編みもの帖</h1>

          {works.length === 0 ? (
            <div className="mt-10 flex flex-col items-center text-center">
              <button
                onClick={onStart}
                className="rounded-full px-7 py-4 text-base text-stone-700 bg-white border border-stone-200 shadow-sm active:scale-95 transition-transform"
              >
                🧶 数えはじめる
              </button>
              <p className="text-xs text-stone-400 mt-4 leading-relaxed max-w-[15rem]">
                なにも準備しなくて大丈夫。
                <br />
                編みながら「今どこか」を数えられます。
              </p>
            </div>
          ) : (
            <>
              {/* いま編んでいるもの＝作業机：小さな写真＋テキスト */}
              {wip.length > 0 && (
                <>
                  <p className="text-sm text-stone-500 mb-4">いま編んでいるもの</p>
                  <ul className="space-y-3">
                    {wip.map((w) => {
                      const cover = coverSrc(w);
                      return (
                        <li key={w.id}>
                          <button
                            onClick={() => onOpen(w.id)}
                            className="w-full text-left flex items-center gap-4 bg-white border border-stone-200 rounded-xl px-4 py-4 hover:shadow-sm transition-shadow"
                          >
                            <div
                              className="w-12 h-12 rounded-lg overflow-hidden flex items-center justify-center text-stone-400 text-sm flex-shrink-0"
                              style={{ background: "#efeae0" }}
                            >
                              {cover ? (
                                <img src={cover} alt="" className="w-full h-full object-cover" />
                              ) : (
                                "🧶"
                              )}
                            </div>
                            <div className="min-w-0">
                              <div className="text-stone-700 truncate">
                                {w.name ? w.name : `${w.currentRow}段目まで編みました`}
                                {!w.name && (
                                  <span className="text-xs text-stone-400 ml-2">→ 名前をつける</span>
                                )}
                              </div>
                              <div className="text-xs text-stone-400 mt-0.5">
                                {fmtDay(w.createdAt)}にはじめた · 編んでいる途中
                              </div>
                            </div>
                          </button>
                        </li>
                      );
                    })}
                  </ul>
                </>
              )}

              {/* 編みあがったもの＝眺める棚：写真だけ */}
              {done.length > 0 && (
                <>
                  <p className="text-sm text-stone-500 mb-4 mt-10">編みあがったもの</p>
                  <div className="grid grid-cols-2 gap-3">
                    {done.map((w) => {
                      const cover = coverSrc(w);
                      return (
                        <button
                          key={w.id}
                          onClick={() => onOpen(w.id)}
                          className="aspect-square rounded-xl overflow-hidden border border-stone-200 bg-white active:scale-95 transition-transform"
                        >
                          {cover ? (
                            <img src={cover} alt="" className="w-full h-full object-cover" />
                          ) : (
                            <div
                              className="w-full h-full flex flex-col items-center justify-center text-center px-3"
                              style={{ background: "#efeae0" }}
                            >
                              <span className="text-stone-500 text-xs leading-relaxed">
                                {w.name ? w.name : `${w.currentRow}段`}
                              </span>
                              <span className="text-[10px] text-stone-400 underline mt-2">
                                写真をそえる
                              </span>
                            </div>
                          )}
                        </button>
                      );
                    })}
                  </div>
                </>
              )}

              <button
                onClick={onStart}
                className="mt-8 text-sm text-stone-500 border border-stone-200 rounded-full px-5 py-2 bg-white active:scale-95 transition-transform"
              >
                ＋ あたらしく数える
              </button>
            </>
          )}
        </div>
      );
    }

    function WorkView({ work, onBack, updateWork }) {
      const [note, setNote] = useState("");
      const [naming, setNaming] = useState(false);
      const [nameDraft, setNameDraft] = useState(work.name || "");
      const [bellOpen, setBellOpen] = useState(false);
      const [swing, setSwing] = useState(false);
      const fileRef = useRef(null);

      useEffect(() => {
        const t = setTimeout(() => {
          setSwing(true);
          setTimeout(() => setSwing(false), 700);
        }, 900);
        return () => clearTimeout(t);
      }, []);

      function plus() {
        updateWork(work.id, (w) => {
          w.currentRow = w.currentRow + 1;
          w.unravelOpenId = null;
          return w;
        });
      }

      function minus() {
        updateWork(work.id, (w) => {
          if (w.currentRow <= 0) return w;
          const next = w.currentRow - 1;
          w.currentRow = next;
          const label = next === 0 ? "ぜんぶほどいた" : `${next}段までほどいた`;
          if (w.unravelOpenId) {
            w.timeline = w.timeline.map((e) =>
              e.id === w.unravelOpenId ? { ...e, text: label, at: Date.now() } : e
            );
          } else {
            const id = "e" + Date.now();
            w.timeline = [...w.timeline, { id, at: Date.now(), type: "unravel", text: label }];
            w.unravelOpenId = id;
          }
          return w;
        });
      }

      function saveNote() {
        const text = note.trim();
        if (!text) return;
        updateWork(work.id, (w) => {
          w.timeline = [
            ...w.timeline,
            { id: "e" + Date.now(), at: Date.now(), type: "note", text },
          ];
          w.unravelOpenId = null;
          return w;
        });
        setNote("");
      }

      // 写真をそえる：縮小してから、あしあとの一種として置く。最初の一枚は自動で表紙に。
      function addPhoto(file) {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const max = 800;
            let width = img.width;
            let height = img.height;
            if (width > height && width > max) {
              height = Math.round((height * max) / width);
              width = max;
            } else if (height >= width && height > max) {
              width = Math.round((width * max) / height);
              height = max;
            }
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);
            const src = canvas.toDataURL("image/jpeg", 0.7);
            const id = "e" + Date.now();
            updateWork(work.id, (w) => {
              w.timeline = [...w.timeline, { id, at: Date.now(), type: "photo", src }];
              w.unravelOpenId = null;
              if (!w.coverId) w.coverId = id; // 最初の一枚が、そっと顔になる
              return w;
            });
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      }

      function setCover(id) {
        updateWork(work.id, (w) => {
          w.coverId = id;
          return w;
        });
      }

      function saveName() {
        updateWork(work.id, (w) => {
          w.name = nameDraft.trim();
          return w;
        });
        setNaming(false);
      }

      function toggleComplete() {
        updateWork(work.id, (w) => {
          w.completed = !w.completed;
          return w;
        });
      }

      function ringBell() {
        setSwing(true);
        setTimeout(() => setSwing(false), 700);
        setBellOpen(true);
      }

      const cover = coverSrc(work);
      const photos = (work.timeline || []).filter((e) => e.type === "photo");
      const defaultCoverId = photos[0]?.id;
      const isCover = (id) => (work.coverId ? work.coverId === id : id === defaultCoverId);

      return (
        <div className="max-w-md mx-auto px-6 pt-6 pb-32 relative">
          <style>{`
            @keyframes bell-swing {
              0% { transform: rotate(0deg); }
              20% { transform: rotate(16deg); }
              45% { transform: rotate(-12deg); }
              70% { transform: rotate(7deg); }
              88% { transform: rotate(-3deg); }
              100% { transform: rotate(0deg); }
            }
            .swing { animation: bell-swing 0.7s ease-in-out; transform-origin: top center; }
          `}</style>

          <button onClick={onBack} className="text-sm text-stone-400 mb-6">
            ← もどる
          </button>

          {/* 顔（表紙）— 写真があるときだけ、そっと */}
          {cover && (
            <div className="flex justify-center mb-4">
              <img
                src={cover}
                alt=""
                className="w-24 h-24 rounded-2xl object-cover border border-stone-200"
              />
            </div>
          )}

          {/* 名前 */}
          <div className="text-center mb-1">
            {work.name && !naming ? (
              <button onClick={() => setNaming(true)} className="text-stone-600 text-base">
                {work.name}
              </button>
            ) : naming ? (
              <div className="flex items-center justify-center gap-2">
                <input
                  value={nameDraft}
                  onChange={(e) => setNameDraft(e.target.value)}
                  placeholder="名前をつける"
                  className="bg-white border border-stone-200 rounded-lg px-3 py-1 text-sm text-stone-700 outline-none"
                />
                <button onClick={saveName} className="text-sm text-amber-700">
                  ✓
                </button>
              </div>
            ) : (
              <button onClick={() => setNaming(true)} className="text-xs text-stone-400 underline">
                名前をつける
              </button>
            )}
          </div>

          {/* しおり = 現在地 */}
          <div className="flex flex-col items-center mt-6 mb-2">
            <div className="flex items-center gap-8">
              <button
                onClick={minus}
                className="w-14 h-14 rounded-full bg-white border border-stone-200 text-2xl text-stone-500 active:scale-90 transition-transform"
              >
                −
              </button>
              <div className="text-center">
                <div className="text-5xl text-stone-700 tabular-nums leading-none">
                  {work.currentRow}
                </div>
                <div className="text-xs text-stone-400 mt-2">段、編み終わった</div>
              </div>
              <button
                onClick={plus}
                className="w-14 h-14 rounded-full bg-white border border-stone-200 text-2xl text-stone-500 active:scale-90 transition-transform"
              >
                ＋
              </button>
            </div>
            <p className="text-[11px] text-stone-400 mt-4">一段、編めたら ＋</p>
          </div>

          {/* あしあと（履歴）— 文字も写真も、同じ列に */}
          <div className="mt-10">
            <p className="text-xs text-stone-400 mb-3">あしあと</p>
            {work.timeline.length === 0 ? (
              <p className="text-xs text-stone-300 leading-relaxed">
                まだ、なにもありません。
                <br />
                ズレたこと・気づいたこと、写真。のこしたくなったときだけ。
              </p>
            ) : (
              <ul className="space-y-3">
                {work.timeline.map((e) => (
                  <li key={e.id} className="flex gap-3 items-baseline">
                    <span className="text-[10px] text-stone-300 w-24 flex-shrink-0">{fmt(e.at)}</span>
                    {e.type === "photo" ? (
                      <div>
                        <img
                          src={e.src}
                          alt=""
                          className="w-28 h-28 rounded-xl object-cover border border-stone-200"
                        />
                        <div className="mt-1">
                          {isCover(e.id) ? (
                            <span className="text-[10px] text-amber-700/80">表紙</span>
                          ) : (
                            <button
                              onClick={() => setCover(e.id)}
                              className="text-[10px] text-stone-400 underline"
                            >
                              表紙にする
                            </button>
                          )}
                        </div>
                      </div>
                    ) : e.type === "unravel" ? (
                      <span className="text-sm italic text-amber-700/80">{e.text}</span>
                    ) : (
                      <span className="text-sm text-stone-600">{e.text}</span>
                    )}
                  </li>
                ))}
              </ul>
            )}
          </div>

          {/* のこす（文字）と、写真をそえる */}
          <div className="mt-8">
            <textarea
              value={note}
              onChange={(e) => setNote(e.target.value)}
              rows={2}
              placeholder="気づいたこと、ズレたこと。書きたくなったときだけ。"
              className="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-700 outline-none resize-none placeholder:text-stone-300"
            />
            <div className="flex justify-end items-center gap-3 mt-2">
              <input
                ref={fileRef}
                type="file"
                accept="image/*"
                className="hidden"
                onChange={(e) => {
                  const f = e.target.files && e.target.files[0];
                  if (f) addPhoto(f);
                  e.target.value = "";
                }}
              />
              <button
                onClick={() => fileRef.current && fileRef.current.click()}
                className="text-sm text-stone-500 border border-stone-200 rounded-full px-5 py-1.5 bg-white active:scale-95 transition-transform"
              >
                写真をそえる
              </button>
              <button
                onClick={saveNote}
                className="text-sm text-stone-500 border border-stone-200 rounded-full px-5 py-1.5 bg-white active:scale-95 transition-transform"
              >
                のこす
              </button>
            </div>
          </div>

          {/* 完成（そっと） */}
          <div className="mt-12 text-center">
            {work.completed ? (
              <div>
                <p className="text-sm text-amber-700">完成 ✓</p>
                <button onClick={toggleComplete} className="text-xs text-stone-400 underline mt-2">
                  やっぱり途中に戻す
                </button>
              </div>
            ) : (
              <div>
                <button onClick={toggleComplete} className="text-sm text-stone-500 underline">
                  これは、完成
                </button>
                <p className="text-[11px] text-stone-300 mt-1">急がなくて大丈夫</p>
              </div>
            )}
          </div>

          {/* ベル（右上・執事はまだ姿だけ） */}
          <button
            onClick={ringBell}
            aria-label="ベルを鳴らす"
            className="fixed top-5 right-5 text-3xl z-20"
            style={{ filter: "drop-shadow(0 2px 3px rgba(0,0,0,0.12))" }}
          >
            <span className={swing ? "swing inline-block" : "inline-block"}>🔔</span>
          </button>

          {bellOpen && (
            <div className="fixed inset-0 z-10 flex items-end" onClick={() => setBellOpen(false)}>
              <div className="absolute inset-0 bg-black/10" />
              <div
                className="relative w-full max-w-md mx-auto bg-white rounded-t-2xl px-6 py-7 border-t border-stone-200"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="text-center">
                  <div className="text-3xl mb-2">🐑</div>
                  <p className="text-sm text-stone-600 leading-relaxed">
                    お呼びでしょうか。
                    <br />
                    <span className="text-stone-400 text-xs">
                      （執事はまだ姿だけです。本来ならこの場所で、
                      <br />
                      目が増えた・ほどく場所がわからない、を一緒に考えます）
                    </span>
                  </p>
                  <button
                    onClick={() => setBellOpen(false)}
                    className="mt-5 text-xs text-stone-400 underline"
                  >
                    とじる
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
