<body>
  <div id="root"></div>

  <script>
    window.supabaseClient = window.supabase.createClient(
      'https://wtkmjnyoqycvxyozwmez.supabase.co',
      'sb_publishable_9Ns9wcF9A-qAnUYOw5RThg_S-8M9uZ8'
    );
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    const serif = { fontFamily: "'Georgia', 'Noto Serif JP', serif" };
    const paper = "#f6f3ec";
    const ink = "#4a443b";

    function fmt(ts) {
      const d = new Date(ts);
      return `${d.getMonth() + 1}月${d.getDate()}日 ${String(d.getHours()).padStart(2, "0")}:${String(
        d.getMinutes()
      ).padStart(2, "0")}`;
    }
    function fmtDay(ts) {
      const d = new Date(ts);
      return `${d.getMonth() + 1}月${d.getDate()}日`;
    }

    const COVER_PHOTO_TARGET_KB = 500;
    const LOG_PHOTO_TARGET_KB = 200;

    // 画像を読み込み、長辺を縮小しつつJPEG品質を段階的に下げて目標サイズ(KB)に近づける
    function compressImage(file, targetKB) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(reader.error);
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => reject(new Error("画像を読み込めませんでした"));
          img.onload = () => {
            const maxDim = 1600;
            let { width, height } = img;
            if (width > maxDim || height > maxDim) {
              const scale = maxDim / Math.max(width, height);
              width = Math.round(width * scale);
              height = Math.round(height * scale);
            }
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);

            const attempt = (quality, triesLeft) => {
              canvas.toBlob(
                (blob) => {
                  if (!blob) {
                    reject(new Error("圧縮に失敗しました"));
                    return;
                  }
                  const sizeKB = blob.size / 1024;
                  if (sizeKB <= targetKB || quality <= 0.3 || triesLeft <= 0) {
                    resolve(blob);
                  } else {
                    attempt(quality - 0.12, triesLeft - 1);
                  }
                },
                "image/jpeg",
                quality
              );
            };
            attempt(0.85, 6);
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // 圧縮済みBlobをSupabase Storageの work-photos バケットにアップロードし、公開URLを返す
    async function uploadWorkPhoto(blob, workId) {
      const path = `${workId}/${Date.now()}.jpg`;
      const { error } = await window.supabaseClient.storage
        .from("work-photos")
        .upload(path, blob, { contentType: "image/jpeg" });
      if (error) throw error;
      const { data } = window.supabaseClient.storage.from("work-photos").getPublicUrl(path);
      return data.publicUrl;
    }

    function App() {
      const [works, setWorks] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [openId, setOpenId] = useState(null);
      const [page, setPage] = useState('home');
      const [error, setError] = useState(null);

      useEffect(() => { loadWorks(); }, []);

      async function loadWorks() {
        setError(null);
        const { data, error } = await window.supabaseClient
          .from('works')
          .select('*')
          .eq('user_id', CURRENT_USER_ID)
          .order('created_at', { ascending: false });
        if (error) {
          setError(error.message);
          setLoaded(true);
          return;
        }
        const coverLogIds = (data || []).map((w) => w.cover_log_id).filter((id) => id != null);
        let coverMap = {};
        if (coverLogIds.length > 0) {
          const { data: coverLogs } = await window.supabaseClient
            .from('work_logs')
            .select('id, photo_url')
            .in('id', coverLogIds);
          (coverLogs || []).forEach((l) => { coverMap[l.id] = l.photo_url; });
        }
        setWorks((data || []).map((w) => ({ ...w, coverUrl: w.cover_log_id ? coverMap[w.cover_log_id] || null : null })));
        setLoaded(true);
      }

      const open = works.find((w) => w.id === openId) || null;

      async function startCounting() {
        setError(null);
        const { data, error } = await window.supabaseClient
          .from('works')
          .insert([{ user_id: CURRENT_USER_ID, title: '', status: 'in_progress', current_row: 0 }])
          .select()
          .single();
        if (error) {
          setError(error.message);
          return;
        }
        setWorks((prev) => [{ ...data, coverUrl: null }, ...prev]);
        setOpenId(data.id);
      }

      function patchWork(id, patch) {
        setWorks((prev) => prev.map((w) => (w.id === id ? { ...w, ...patch } : w)));
      }

      if (!loaded) {
        return (
          <div style={{ ...serif, background: paper }} className="min-h-screen flex items-center justify-center">
            <p className="text-stone-400 text-sm">ひらいています…</p>
          </div>
        );
      }

      return (
        <div style={{ ...serif, background: paper, color: ink }} className="min-h-screen">
          {open ? (
            <WorkView work={open} onBack={() => setOpenId(null)} onChange={patchWork} />
          ) : page === 'yarns' ? (
            <YarnsPage onBack={() => setPage('home')} />
          ) : (
            <Home works={works} onStart={startCounting} onOpen={setOpenId} onYarns={() => setPage('yarns')} />
          )}
          {error && (
            <div className="fixed bottom-3 left-1/2 -translate-x-1/2 text-xs text-red-400">{error}</div>
          )}
        </div>
      );
    }

    function Home({ works, onStart, onOpen, onYarns }) {
      const wip = works.filter((w) => w.status !== 'completed');
      const done = works.filter((w) => w.status === 'completed');

      return (
        <div className="max-w-md mx-auto px-6 pt-12 pb-24">
          <p className="text-xs tracking-widest text-stone-400 mb-1">AMIMONO</p>
          <h1 className="text-xl text-stone-700 mb-10">編みもの帖</h1>

          {works.length === 0 ? (
            <div className="mt-10 flex flex-col items-center text-center">
              <button
                onClick={onStart}
                className="rounded-full px-7 py-4 text-base text-stone-700 bg-white border border-stone-200 shadow-sm active:scale-95 transition-transform"
              >
                🧶 数えはじめる
              </button>
              <p className="text-xs text-stone-400 mt-4 leading-relaxed max-w-[15rem]">
                なにも準備しなくて大丈夫。
                <br />
                編みながら「今どこか」を数えられます。
              </p>
            </div>
          ) : (
            <>
              {/* いま編んでいるもの＝作業机：小さな写真＋テキスト */}
              {wip.length > 0 && (
                <>
                  <p className="text-sm text-stone-500 mb-4">いま編んでいるもの</p>
                  <ul className="space-y-3">
                    {wip.map((w) => {
                      const cover = w.coverUrl;
                      return (
                        <li key={w.id}>
                          <button
                            onClick={() => onOpen(w.id)}
                            className="w-full text-left flex items-center gap-4 bg-white border border-stone-200 rounded-xl px-4 py-4 hover:shadow-sm transition-shadow"
                          >
                            <div
                              className="w-12 h-12 rounded-lg overflow-hidden flex items-center justify-center text-stone-400 text-sm flex-shrink-0"
                              style={{ background: "#efeae0" }}
                            >
                              {cover ? (
                                <img src={cover} alt="" className="w-full h-full object-cover" />
                              ) : (
                                "🧶"
                              )}
                            </div>
                            <div className="min-w-0">
                              <div className="text-stone-700 truncate">
                                {w.title ? w.title : `${w.current_row}段目まで編みました`}
                                {!w.title && (
                                  <span className="text-xs text-stone-400 ml-2">→ 名前をつける</span>
                                )}
                              </div>
                              <div className="text-xs text-stone-400 mt-0.5">
                                {fmtDay(new Date(w.created_at).getTime())}にはじめた · 編んでいる途中
                              </div>
                            </div>
                          </button>
                        </li>
                      );
                    })}
                  </ul>
                </>
              )}

              {/* 編みあがったもの＝眺める棚：写真だけ */}
              {done.length > 0 && (
                <>
                  <p className="text-sm text-stone-500 mb-4 mt-10">編みあがったもの</p>
                  <div className="grid grid-cols-2 gap-3">
                    {done.map((w) => {
                      const cover = w.coverUrl;
                      return (
                        <button
                          key={w.id}
                          onClick={() => onOpen(w.id)}
                          className="aspect-square rounded-xl overflow-hidden border border-stone-200 bg-white active:scale-95 transition-transform"
                        >
                          {cover ? (
                            <img src={cover} alt="" className="w-full h-full object-cover" />
                          ) : (
                            <div
                              className="w-full h-full flex flex-col items-center justify-center text-center px-3"
                              style={{ background: "#efeae0" }}
                            >
                              <span className="text-stone-500 text-xs leading-relaxed">
                                {w.title ? w.title : `${w.current_row}段`}
                              </span>
                              <span className="text-[10px] text-stone-400 underline mt-2">
                                写真をそえる
                              </span>
                            </div>
                          )}
                        </button>
                      );
                    })}
                  </div>
                </>
              )}

              <button
                onClick={onStart}
                className="mt-8 text-sm text-stone-500 border border-stone-200 rounded-full px-5 py-2 bg-white active:scale-95 transition-transform"
              >
                ＋ あたらしく数える
              </button>
            </>
          )}

          <button
            onClick={onYarns}
            className="mt-6 text-sm text-stone-500 border border-stone-200 rounded-full px-5 py-2 bg-white active:scale-95 transition-transform"
          >
            🧶 毛糸ストック
          </button>
        </div>
      );
    }

    const ROW_SAVE_DEBOUNCE_MS = 3000;

    function WorkView({ work, onBack, onChange }) {
      const [logs, setLogs] = useState([]);
      const [logsLoaded, setLogsLoaded] = useState(false);
      const [currentRow, setCurrentRow] = useState(work.current_row);
      const [status, setStatus] = useState(work.status);
      const [title, setTitle] = useState(work.title || "");
      const [coverLogId, setCoverLogId] = useState(work.cover_log_id);
      const [pendingUnravel, setPendingUnravel] = useState(null);
      const [note, setNote] = useState("");
      const [naming, setNaming] = useState(false);
      const [nameDraft, setNameDraft] = useState(work.title || "");
      const [bellOpen, setBellOpen] = useState(false);
      const [swing, setSwing] = useState(false);
      const [error, setError] = useState(null);
      const fileRef = useRef(null);
      const debounceTimerRef = useRef(null);
      const currentRowRef = useRef(currentRow);
      const lastSavedRowRef = useRef(work.current_row);
      const pendingUnravelRef = useRef(null);

      useEffect(() => { currentRowRef.current = currentRow; }, [currentRow]);
      useEffect(() => { pendingUnravelRef.current = pendingUnravel; }, [pendingUnravel]);

      useEffect(() => {
        (async () => {
          const { data, error } = await window.supabaseClient
            .from("work_logs")
            .select("*")
            .eq("work_id", work.id)
            .order("created_at", { ascending: true });
          if (error) setError(error.message);
          else setLogs(data || []);
          setLogsLoaded(true);
        })();
      }, [work.id]);

      useEffect(() => {
        const t = setTimeout(() => {
          setSwing(true);
          setTimeout(() => setSwing(false), 700);
        }, 900);
        return () => clearTimeout(t);
      }, []);

      useEffect(() => {
        return () => {
          if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
        };
      }, []);

      function scheduleFlush() {
        if (debounceTimerRef.current) clearTimeout(debounceTimerRef.current);
        debounceTimerRef.current = setTimeout(() => {
          debounceTimerRef.current = null;
          flush();
        }, ROW_SAVE_DEBOUNCE_MS);
      }

      // 段数の保存と、編集中の「ほどいた」記録の保存をまとめて行う（デバウンスされた書き込み）
      async function flush() {
        const rowToSave = currentRowRef.current;
        const unravel = pendingUnravelRef.current;
        try {
          if (rowToSave !== lastSavedRowRef.current) {
            const { error } = await window.supabaseClient
              .from("works")
              .update({ current_row: rowToSave })
              .eq("id", work.id);
            if (error) throw error;
            lastSavedRowRef.current = rowToSave;
            onChange(work.id, { current_row: rowToSave });
          }
          if (unravel) {
            if (unravel.dbId == null) {
              const { data, error } = await window.supabaseClient
                .from("work_logs")
                .insert([{ work_id: work.id, type: "unravel", content: unravel.text }])
                .select()
                .single();
              if (error) throw error;
              setPendingUnravel((p) => (p && p.dbId == null ? { ...p, dbId: data.id } : p));
            } else {
              const { error } = await window.supabaseClient
                .from("work_logs")
                .update({ content: unravel.text, created_at: new Date().toISOString() })
                .eq("id", unravel.dbId);
              if (error) throw error;
            }
          }
        } catch (e) {
          setError(e.message);
        }
      }

      // 「ほどいた」の編集中セッションを確定させる：今すぐ保存し、あしあとの一覧に確定として加える
      async function commitPendingNow() {
        if (debounceTimerRef.current) {
          clearTimeout(debounceTimerRef.current);
          debounceTimerRef.current = null;
        }
        await flush();
        const finalized = pendingUnravelRef.current;
        if (finalized && finalized.dbId != null) {
          setLogs((prev) => [
            ...prev,
            {
              id: finalized.dbId,
              work_id: work.id,
              type: "unravel",
              content: finalized.text,
              created_at: new Date(finalized.at).toISOString(),
            },
          ]);
        }
        setPendingUnravel(null);
      }

      function plus() {
        if (pendingUnravelRef.current) commitPendingNow();
        setCurrentRow((c) => c + 1);
        scheduleFlush();
      }

      function minus() {
        setCurrentRow((c) => {
          if (c <= 0) return c;
          const next = c - 1;
          const label = next === 0 ? "ぜんぶほどいた" : `${next}段までほどいた`;
          setPendingUnravel((prev) => ({ dbId: prev ? prev.dbId : null, text: label, at: Date.now() }));
          return next;
        });
        scheduleFlush();
      }

      async function saveNote() {
        const text = note.trim();
        if (!text) return;
        await commitPendingNow();
        setError(null);
        const { data, error } = await window.supabaseClient
          .from("work_logs")
          .insert([{ work_id: work.id, type: "note", content: text }])
          .select()
          .single();
        if (error) {
          setError(error.message);
          return;
        }
        setLogs((prev) => [...prev, data]);
        setNote("");
      }

      // 写真をそえる：圧縮してStorageにアップロードし、あしあとの一種として置く。最初の一枚は自動で表紙に。
      async function addPhoto(file) {
        await commitPendingNow();
        setError(null);
        const isFirstPhoto = !logs.some((l) => l.type === "photo");
        try {
          const blob = await compressImage(file, isFirstPhoto ? COVER_PHOTO_TARGET_KB : LOG_PHOTO_TARGET_KB);
          const url = await uploadWorkPhoto(blob, work.id);
          const { data, error } = await window.supabaseClient
            .from("work_logs")
            .insert([{ work_id: work.id, type: "photo", photo_url: url }])
            .select()
            .single();
          if (error) throw error;
          setLogs((prev) => [...prev, data]);
          if (isFirstPhoto) {
            const { error: coverError } = await window.supabaseClient
              .from("works")
              .update({ cover_log_id: data.id })
              .eq("id", work.id);
            if (coverError) throw coverError;
            setCoverLogId(data.id);
            onChange(work.id, { cover_log_id: data.id, coverUrl: url });
          }
        } catch (e) {
          setError(e.message);
        }
      }

      async function setCover(logId, photoUrl) {
        setError(null);
        const { error } = await window.supabaseClient
          .from("works")
          .update({ cover_log_id: logId })
          .eq("id", work.id);
        if (error) {
          setError(error.message);
          return;
        }
        setCoverLogId(logId);
        onChange(work.id, { cover_log_id: logId, coverUrl: photoUrl });
      }

      async function saveName() {
        const trimmed = nameDraft.trim();
        setNaming(false);
        setTitle(trimmed);
        setError(null);
        const { error } = await window.supabaseClient
          .from("works")
          .update({ title: trimmed })
          .eq("id", work.id);
        if (error) {
          setError(error.message);
          return;
        }
        onChange(work.id, { title: trimmed });
      }

      async function toggleComplete() {
        const next = status === "completed" ? "in_progress" : "completed";
        setStatus(next);
        setError(null);
        const { error } = await window.supabaseClient
          .from("works")
          .update({ status: next })
          .eq("id", work.id);
        if (error) {
          setError(error.message);
          return;
        }
        onChange(work.id, { status: next });
      }

      async function handleBack() {
        await commitPendingNow();
        onBack();
      }

      function ringBell() {
        setSwing(true);
        setTimeout(() => setSwing(false), 700);
        setBellOpen(true);
      }

      const timelineItems = [
        ...logs.map((l) => ({
          id: l.id,
          at: new Date(l.created_at).getTime(),
          type: l.type,
          text: l.content,
          src: l.photo_url,
        })),
        ...(pendingUnravel
          ? [{ id: "pending-unravel", at: pendingUnravel.at, type: "unravel", text: pendingUnravel.text }]
          : []),
      ];
      const photoItems = timelineItems.filter((e) => e.type === "photo");
      const defaultCoverId = photoItems[0]?.id;
      const cover = coverLogId
        ? photoItems.find((p) => p.id === coverLogId)?.src || null
        : photoItems[0]?.src || null;
      const isCover = (id) => (coverLogId ? coverLogId === id : id === defaultCoverId);

      return (
        <div className="max-w-md mx-auto px-6 pt-6 pb-32 relative">
          <style>{`
            @keyframes bell-swing {
              0% { transform: rotate(0deg); }
              20% { transform: rotate(16deg); }
              45% { transform: rotate(-12deg); }
              70% { transform: rotate(7deg); }
              88% { transform: rotate(-3deg); }
              100% { transform: rotate(0deg); }
            }
            .swing { animation: bell-swing 0.7s ease-in-out; transform-origin: top center; }
          `}</style>

          <button onClick={handleBack} className="text-sm text-stone-400 mb-6">
            ← もどる
          </button>

          {/* 顔（表紙）— 写真があるときだけ、そっと */}
          {cover && (
            <div className="flex justify-center mb-4">
              <img
                src={cover}
                alt=""
                className="w-24 h-24 rounded-2xl object-cover border border-stone-200"
              />
            </div>
          )}

          {/* 名前 */}
          <div className="text-center mb-1">
            {title && !naming ? (
              <button onClick={() => setNaming(true)} className="text-stone-600 text-base">
                {title}
              </button>
            ) : naming ? (
              <div className="flex items-center justify-center gap-2">
                <input
                  value={nameDraft}
                  onChange={(e) => setNameDraft(e.target.value)}
                  placeholder="名前をつける"
                  className="bg-white border border-stone-200 rounded-lg px-3 py-1 text-sm text-stone-700 outline-none"
                />
                <button onClick={saveName} className="text-sm text-amber-700">
                  ✓
                </button>
              </div>
            ) : (
              <button onClick={() => setNaming(true)} className="text-xs text-stone-400 underline">
                名前をつける
              </button>
            )}
          </div>

          {/* しおり = 現在地 */}
          <div className="flex flex-col items-center mt-6 mb-2">
            <div className="flex items-center gap-8">
              <button
                onClick={minus}
                className="w-14 h-14 rounded-full bg-white border border-stone-200 text-2xl text-stone-500 active:scale-90 transition-transform"
              >
                −
              </button>
              <div className="text-center">
                <div className="text-5xl text-stone-700 tabular-nums leading-none">
                  {currentRow}
                </div>
                <div className="text-xs text-stone-400 mt-2">段、編み終わった</div>
              </div>
              <button
                onClick={plus}
                className="w-14 h-14 rounded-full bg-white border border-stone-200 text-2xl text-stone-500 active:scale-90 transition-transform"
              >
                ＋
              </button>
            </div>
            <p className="text-[11px] text-stone-400 mt-4">一段、編めたら ＋</p>
          </div>

          {/* あしあと（履歴）— 文字も写真も、同じ列に */}
          <div className="mt-10">
            <p className="text-xs text-stone-400 mb-3">あしあと</p>
            {!logsLoaded ? (
              <p className="text-xs text-stone-300">よみこんでいます…</p>
            ) : timelineItems.length === 0 ? (
              <p className="text-xs text-stone-300 leading-relaxed">
                まだ、なにもありません。
                <br />
                ズレたこと・気づいたこと、写真。のこしたくなったときだけ。
              </p>
            ) : (
              <ul className="space-y-3">
                {timelineItems.map((e) => (
                  <li key={e.id} className="flex gap-3 items-baseline">
                    <span className="text-[10px] text-stone-300 w-24 flex-shrink-0">{fmt(e.at)}</span>
                    {e.type === "photo" ? (
                      <div>
                        <img
                          src={e.src}
                          alt=""
                          className="w-28 h-28 rounded-xl object-cover border border-stone-200"
                        />
                        <div className="mt-1">
                          {isCover(e.id) ? (
                            <span className="text-[10px] text-amber-700/80">表紙</span>
                          ) : (
                            <button
                              onClick={() => setCover(e.id, e.src)}
                              className="text-[10px] text-stone-400 underline"
                            >
                              表紙にする
                            </button>
                          )}
                        </div>
                      </div>
                    ) : e.type === "unravel" ? (
                      <span className="text-sm italic text-amber-700/80">{e.text}</span>
                    ) : (
                      <span className="text-sm text-stone-600">{e.text}</span>
                    )}
                  </li>
                ))}
              </ul>
            )}
          </div>

          {/* のこす（文字）と、写真をそえる */}
          <div className="mt-8">
            <textarea
              value={note}
              onChange={(e) => setNote(e.target.value)}
              rows={2}
              placeholder="気づいたこと、ズレたこと。書きたくなったときだけ。"
              className="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-700 outline-none resize-none placeholder:text-stone-300"
            />
            <div className="flex justify-end items-center gap-3 mt-2">
              <input
                ref={fileRef}
                type="file"
                accept="image/*"
                className="hidden"
                onChange={(e) => {
                  const f = e.target.files && e.target.files[0];
                  if (f) addPhoto(f);
                  e.target.value = "";
                }}
              />
              <button
                onClick={() => fileRef.current && fileRef.current.click()}
                className="text-sm text-stone-500 border border-stone-200 rounded-full px-5 py-1.5 bg-white active:scale-95 transition-transform"
              >
                写真をそえる
              </button>
              <button
                onClick={saveNote}
                className="text-sm text-stone-500 border border-stone-200 rounded-full px-5 py-1.5 bg-white active:scale-95 transition-transform"
              >
                のこす
              </button>
            </div>
          </div>

          {error && <p className="text-xs text-red-400 text-center mt-4">{error}</p>}

          {/* 完成（そっと） */}
          <div className="mt-12 text-center">
            {status === "completed" ? (
              <div>
                <p className="text-sm text-amber-700">完成 ✓</p>
                <button onClick={toggleComplete} className="text-xs text-stone-400 underline mt-2">
                  やっぱり途中に戻す
                </button>
              </div>
            ) : (
              <div>
                <button onClick={toggleComplete} className="text-sm text-stone-500 underline">
                  これは、完成
                </button>
                <p className="text-[11px] text-stone-300 mt-1">急がなくて大丈夫</p>
              </div>
            )}
          </div>

          {/* ベル（右上・執事はまだ姿だけ） */}
          <button
            onClick={ringBell}
            aria-label="ベルを鳴らす"
            className="fixed top-5 right-5 text-3xl z-20"
            style={{ filter: "drop-shadow(0 2px 3px rgba(0,0,0,0.12))" }}
          >
            <span className={swing ? "swing inline-block" : "inline-block"}>🔔</span>
          </button>

          {bellOpen && (
            <div className="fixed inset-0 z-10 flex items-end" onClick={() => setBellOpen(false)}>
              <div className="absolute inset-0 bg-black/10" />
              <div
                className="relative w-full max-w-md mx-auto bg-white rounded-t-2xl px-6 py-7 border-t border-stone-200"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="text-center">
                  <div className="text-3xl mb-2">🐑</div>
                  <p className="text-sm text-stone-600 leading-relaxed">
                    お呼びでしょうか。
                    <br />
                    <span className="text-stone-400 text-xs">
                      （執事はまだ姿だけです。本来ならこの場所で、
                      <br />
                      目が増えた・ほどく場所がわからない、を一緒に考えます）
                    </span>
                  </p>
                  <button
                    onClick={() => setBellOpen(false)}
                    className="mt-5 text-xs text-stone-400 underline"
                  >
                    とじる
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const CURRENT_USER_ID = 1; // 暫定固定値。ログイン機能が入ったら差し替える。

    function YarnsPage({ onBack }) {
      const [yarns, setYarns] = useState([]);
      const [stocks, setStocks] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [form, setForm] = useState({ name: '', brand: '', color: '', memo: '' });
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const [stockForms, setStockForms] = useState({});
      const [stockSavingId, setStockSavingId] = useState(null);

      useEffect(() => { loadYarns(); }, []);

      async function loadYarns() {
        setLoading(true);
        setError(null);
        const [{ data: yarnsData, error: yarnsError }, { data: stocksData, error: stocksError }] = await Promise.all([
          window.supabaseClient.from('yarns').select('*'),
          window.supabaseClient.from('yarn_stocks').select('*').eq('user_id', CURRENT_USER_ID),
        ]);
        if (yarnsError) {
          setError(yarnsError.message);
        } else if (stocksError) {
          setError(stocksError.message);
        } else {
          setYarns(yarnsData || []);
          setStocks(stocksData || []);
        }
        setLoading(false);
      }

      async function handleSubmit(e) {
        e.preventDefault();
        if (!form.name.trim()) return;
        setSaving(true);
        setError(null);
        const { error } = await window.supabaseClient.from('yarns').insert([{
          name: form.name.trim(),
          brand: form.brand.trim() || null,
          color: form.color.trim() || null,
          memo: form.memo.trim() || null,
        }]);
        setSaving(false);
        if (error) {
          setError(error.message);
        } else {
          setForm({ name: '', brand: '', color: '', memo: '' });
          setSaved(true);
          setTimeout(() => setSaved(false), 1400);
          loadYarns();
        }
      }

      function getStockForm(yarnId) {
        return stockForms[yarnId] || { quantity: '', lot_number: '' };
      }

      function setStockForm(yarnId, next) {
        setStockForms({ ...stockForms, [yarnId]: { ...getStockForm(yarnId), ...next } });
      }

      async function handleAddStock(yarnId) {
        const stockForm = getStockForm(yarnId);
        if (!stockForm.quantity) return;
        setStockSavingId(yarnId);
        setError(null);
        const { error } = await window.supabaseClient.from('yarn_stocks').insert([{
          user_id: CURRENT_USER_ID,
          yarn_id: yarnId,
          quantity: Number(stockForm.quantity),
          lot_number: stockForm.lot_number.trim() || null,
        }]);
        setStockSavingId(null);
        if (error) {
          setError(error.message);
        } else {
          setStockForm(yarnId, { quantity: '', lot_number: '' });
          loadYarns();
        }
      }

      return (
        <div className="max-w-md mx-auto px-6 pt-12 pb-24">
          <button onClick={onBack} className="text-sm text-stone-400 mb-6">← もどる</button>
          <p className="text-xs tracking-widest text-stone-400 mb-1">AMIMONO</p>
          <h1 className="text-xl text-stone-700 mb-8">毛糸ストック</h1>

          <form onSubmit={handleSubmit} className="bg-white border border-stone-200 rounded-2xl p-5 mb-8 space-y-3">
            <p className="text-xs text-stone-400 mb-2">あたらしく登録する</p>
            <input
              value={form.name}
              onChange={e => setForm({ ...form, name: e.target.value })}
              placeholder="毛糸の名前 *"
              required
              className="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-700 outline-none placeholder:text-stone-300"
            />
            <input
              value={form.brand}
              onChange={e => setForm({ ...form, brand: e.target.value })}
              placeholder="ブランド"
              className="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-700 outline-none placeholder:text-stone-300"
            />
            <input
              value={form.color}
              onChange={e => setForm({ ...form, color: e.target.value })}
              placeholder="色"
              className="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-700 outline-none placeholder:text-stone-300"
            />
            <textarea
              value={form.memo}
              onChange={e => setForm({ ...form, memo: e.target.value })}
              placeholder="メモ"
              rows={2}
              className="w-full bg-stone-50 border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-700 outline-none resize-none placeholder:text-stone-300"
            />
            {error && <p className="text-xs text-red-400">{error}</p>}
            <div className="flex justify-end">
              <button
                type="submit"
                disabled={saving}
                className="text-sm text-stone-500 border border-stone-200 rounded-full px-5 py-1.5 bg-white active:scale-95 transition-transform disabled:opacity-40"
              >
                {saving ? '登録中…' : 'のこす'}
              </button>
            </div>
          </form>

          {loading ? (
            <p className="text-xs text-stone-400">よみこんでいます…</p>
          ) : yarns.length === 0 ? (
            <p className="text-xs text-stone-300 leading-relaxed">まだ登録された毛糸はありません。</p>
          ) : (
            <ul className="space-y-3">
              {yarns.map(yarn => {
                const yarnStocks = stocks.filter(s => s.yarn_id === yarn.id);
                const totalQuantity = yarnStocks.reduce((sum, s) => sum + (s.quantity || 0), 0);
                const stockForm = getStockForm(yarn.id);
                return (
                  <li key={yarn.id} className="bg-white border border-stone-200 rounded-xl px-4 py-4">
                    <div className="text-stone-700 text-sm">{yarn.name}</div>
                    <div className="flex flex-wrap gap-x-2 mt-0.5">
                      {yarn.brand && <span className="text-xs text-stone-400">{yarn.brand}</span>}
                      {yarn.color && <span className="text-xs text-stone-400">· {yarn.color}</span>}
                    </div>
                    {yarn.memo && <p className="text-xs text-stone-500 mt-1">{yarn.memo}</p>}

                    <div className="mt-3 pt-3 border-t border-stone-100">
                      <p className="text-xs text-stone-400 mb-1.5">
                        在庫 {totalQuantity > 0 ? `· ${totalQuantity}玉` : ''}
                      </p>
                      {yarnStocks.length > 0 && (
                        <ul className="space-y-1 mb-2">
                          {yarnStocks.map(s => (
                            <li key={s.id} className="text-xs text-stone-500 flex justify-between">
                              <span>{s.lot_number ? `ロット ${s.lot_number}` : 'ロット未記入'}</span>
                              <span>{s.quantity}玉</span>
                            </li>
                          ))}
                        </ul>
                      )}
                      <div className="flex gap-1.5">
                        <input
                          value={stockForm.quantity}
                          onChange={e => setStockForm(yarn.id, { quantity: e.target.value })}
                          type="number"
                          min="0"
                          placeholder="数量"
                          className="w-20 bg-stone-50 border border-stone-200 rounded-lg px-2 py-1.5 text-xs text-stone-700 outline-none placeholder:text-stone-300"
                        />
                        <input
                          value={stockForm.lot_number}
                          onChange={e => setStockForm(yarn.id, { lot_number: e.target.value })}
                          placeholder="ロット番号"
                          className="flex-1 bg-stone-50 border border-stone-200 rounded-lg px-2 py-1.5 text-xs text-stone-700 outline-none placeholder:text-stone-300"
                        />
                        <button
                          onClick={() => handleAddStock(yarn.id)}
                          disabled={stockSavingId === yarn.id || !stockForm.quantity}
                          className="text-xs text-stone-500 border border-stone-200 rounded-lg px-3 py-1.5 bg-white active:scale-95 transition-transform disabled:opacity-40"
                        >
                          追加
                        </button>
                      </div>
                    </div>
                  </li>
                );
              })}
            </ul>
          )}

          <div
            className={`fixed bottom-3 left-1/2 -translate-x-1/2 text-xs text-stone-400 transition-opacity duration-500 ${
              saved ? 'opacity-100' : 'opacity-0'
            }`}
          >
            保存しました
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
